blueprint:
  name: Sunrise Light Simulator
  description: >
    Gradually brighten lights and change color to simulate a natural sunrise.
    Uses configurable step intervals (default 30 sec) with smooth transitions
    and a non-linear curve that mimics real sunrise progression.
  domain: automation
  input:
    target_lights:
      name: Lights
      description: Select lights by entity, area, device, or label for the sunrise simulation
      selector:
        target: {}
    start_time:
      name: Start Time
      description: Time to start the sunrise simulation
      selector:
        time: {}
    duration:
      name: Duration (minutes)
      description: How long the sunrise should last
      default: 45
      selector:
        number:
          min: 5
          max: 120
          step: 5
          unit_of_measurement: minutes
    max_brightness:
      name: Maximum Brightness
      description: The maximum brightness level to reach at the end of the sunrise
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    pre_sunrise_actions:
      name: Pre-Sunrise Actions (Optional)
      description: Actions to run before the sunrise simulation starts
      default: []
      selector:
        action: {}
    post_sunrise_actions:
      name: Post-Sunrise Actions (Optional)
      description: Actions to run after the sunrise simulation completes
      default: []
      selector:
        action: {}
    step_interval:
      name: Step Interval (seconds)
      description: Time between brightness changes. Lower = smoother but more service calls. Try 10 for bulbs that ignore transitions.
      default: 30
      selector:
        number:
          min: 5
          max: 60
          step: 5
          unit_of_measurement: seconds

trigger:
  - platform: time
    at: !input start_time

condition: []

variables:
  duration: !input duration
  max_brightness: !input max_brightness
  step_interval: !input step_interval
  total_steps: "{{ (duration * 60 / step_interval) | int }}"
  start_kelvin: 2000
  end_kelvin: 5500

action:
  - choose: []
    default: !input pre_sunrise_actions

  - action: light.turn_on
    target: !input target_lights
    data:
      brightness_pct: 1
      color_temp_kelvin: "{{ start_kelvin }}"
    continue_on_error: true

  - delay:
      seconds: 2

  - repeat:
      count: "{{ total_steps }}"
      sequence:
        - action: light.turn_on
          target: !input target_lights
          data:
            brightness_pct: "{{ (1 + (max_brightness - 1) * ((repeat.index / total_steps) ** 1.3)) | int }}"
            color_temp_kelvin: "{{ (2000 + 3500 * (1 - ((1 - repeat.index / total_steps) ** 1.5))) | int }}"
            transition: "{{ step_interval }}"
          continue_on_error: true

        - delay:
            seconds: "{{ step_interval }}"

  - action: light.turn_on
    target: !input target_lights
    data:
      brightness_pct: "{{ max_brightness }}"
      color_temp_kelvin: "{{ end_kelvin }}"
    continue_on_error: true

  - choose: []
    default: !input post_sunrise_actions

mode: single