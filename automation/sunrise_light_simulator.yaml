blueprint:
  name: Sunrise Light Simulator
  description: >
    Gradually brighten lights and change color to simulate a natural sunrise.
    Uses configurable step intervals (default 30 sec) with smooth transitions
    and a non-linear curve that mimics real sunrise progression.
  domain: automation
  input:
    target_lights:
      name: Lights
      description: Select lights by entity, area, device, or label for the sunrise simulation
      selector:
        target: {}
    start_time:
      name: Start Time
      description: Time to start the sunrise simulation
      selector:
        time: {}
    duration:
      name: Duration (minutes)
      description: How long the sunrise should last
      default: 45
      selector:
        number:
          min: 5
          max: 120
          step: 5
          unit_of_measurement: minutes
    max_brightness:
      name: Maximum Brightness
      description: The maximum brightness level to reach at the end of the sunrise
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    pre_sunrise_actions:
      name: Pre-Sunrise Actions (Optional)
      description: Actions to run before the sunrise simulation starts
      default: []
      selector:
        action: {}
    post_sunrise_actions:
      name: Post-Sunrise Actions (Optional)
      description: Actions to run after the sunrise simulation completes
      default: []
      selector:
        action: {}
    step_interval:
      name: Step Interval (seconds)
      description: >
        Time between brightness changes. Lower values = smoother transitions but more service calls; higher values = more compatible with all lights.
        Device recommendations: LIFX 5-10s, Philips Hue 10-15s, Govee/MQTT 15-30s, Generic dimmers 10-20s.
        If you see jarring transitions, try increasing this value.
      default: 30
      selector:
        number:
          min: 5
          max: 60
          step: 5
          unit_of_measurement: seconds
    startup_brightness:
      name: Startup Brightness (%)
      description: Initial brightness when the sunrise simulation starts. Some lights (especially Govee) have issues with very low startup commands. Try 5-10% instead of 1% if your light flickers or doesn't respond at startup.
      default: 1
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"

trigger:
  - platform: time
    at: !input start_time

condition: []

variables:
  duration: !input duration
  max_brightness: !input max_brightness
  step_interval: !input step_interval
  startup_brightness: !input startup_brightness
  total_steps: "{{ (duration * 60 / step_interval) | int }}"
  start_kelvin: 2000
  end_kelvin: 5500
  target_lights: !input target_lights
  monitor_entity: >
    {% if target_lights.entity_id is defined %}
      {% if target_lights.entity_id is string %}
        {{ target_lights.entity_id }}
      {% else %}
        {{ target_lights.entity_id[0] }}
      {% endif %}
    {% else %}
      none
    {% endif %}

action:
  - choose: []
    default: !input pre_sunrise_actions

  - action: light.turn_on
    target: !input target_lights
    data:
      brightness_pct: "{{ startup_brightness }}"
      color_temp_kelvin: "{{ start_kelvin }}"
    continue_on_error: true

  - delay:
      seconds: 2

  - repeat:
      while:
        - condition: template
          value_template: "{{ repeat.index <= total_steps }}"
        - condition: template
          value_template: "{{ monitor_entity == 'none' or is_state(monitor_entity, 'on') }}"
      sequence:
        - action: light.turn_on
          target: !input target_lights
          data:
            brightness_pct: "{{ (startup_brightness + (max_brightness - startup_brightness) * ((repeat.index / total_steps) ** 1.3)) | int }}"
            color_temp_kelvin: "{{ (2000 + 3500 * (1 - ((1 - repeat.index / total_steps) ** 1.5))) | int }}"
            transition: "{{ step_interval }}"
          continue_on_error: true

        - delay:
            seconds: "{{ step_interval }}"

  - condition: template
    value_template: "{{ monitor_entity == 'none' or is_state(monitor_entity, 'on') }}"

  - action: light.turn_on
    target: !input target_lights
    data:
      brightness_pct: "{{ max_brightness }}"
      color_temp_kelvin: "{{ end_kelvin }}"
    continue_on_error: true

  - condition: template
    value_template: "{{ monitor_entity == 'none' or is_state(monitor_entity, 'on') }}"

  - choose: []
    default: !input post_sunrise_actions

mode: single